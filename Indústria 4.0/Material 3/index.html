                    <p class="mb-4 font-medium">Qual o foco principal da Sociedade 5.0?</p>
                    <div class="space-y-2">
                        <button onclick="alert('Incorreto!')" class="w-full p-4 text-left border border-slate-200 rounded-xl hover:bg-purple-50 transition">A) Aumentar a velocidade das máquinas.</button>
                        <button onclick="alert('Correto! O bem-estar humano é o objetivo.')" class="w-full p-4 text-left border border-slate-200 rounded-xl hover:bg-emerald-50 transition">B) Usar a tecnologia para o bem-estar e resolução de problemas humanos.</button>
                    </div>
                `
            },
            {
                title: "Quiz Final do Material",
                content: `
                    <h2 class="text-3xl font-bold mb-6">29. Quiz Final - Parte II</h2>
                    <p class="mb-4 font-medium">O que é um 'Pitch'?</p>
                    <div class="space-y-2">
                        <button onclick="alert('Correto! Curto, direto e convincente.')" class="w-full p-4 text-left border border-slate-200 rounded-xl hover:bg-emerald-50 transition">A) Uma apresentação curta e impactante de uma ideia.</button>
                        <button onclick="alert('Incorreto!')" class="w-full p-4 text-left border border-slate-200 rounded-xl hover:bg-red-50 transition">B) Um tipo de linguagem de programação para robôs.</button>
                    </div>
                `
            },
            {
                title: "Formatura Digital",
                content: `
                    <div class="text-center py-10">
                        <div class="w-24 h-24 bg-purple-100 text-purple-600 rounded-full flex items-center justify-center mx-auto mb-8 animate-bounce shadow-2xl">
                            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"></path></svg>
                        </div>
                        <h2 class="text-4xl font-extrabold text-slate-900 mb-4">Você Concluiu a Jornada!</h2>
                        <p class="text-slate-500 mb-8 max-w-sm mx-auto text-lg">As 12 horas de Fundamentos da Indústria 4.0 terminaram, mas sua carreira de inovador está apenas começando.</p>
                    </div>
                `
            }
        ];

        let currentPage = 0;

        function renderPage() {
            const container = document.getElementById('contentTarget');
            const page = pages[currentPage];
            
            container.innerHTML = `
                <div class="page-content active">
                    <p class="text-xs font-black text-purple-400 uppercase tracking-[0.2em] mb-3">${page.title}</p>
                    ${page.content}
                </div>
            `;

            const progress = ((currentPage + 1) / pages.length) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
            document.getElementById('pageIndicator').innerText = `${String(currentPage + 1).padStart(2, '0')}/${pages.length}`;
            
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').innerText = currentPage === pages.length - 1 ? "Finalizar o Material" : "Próxima Página";
            
            window.scrollTo(0, 0);
            updateDots();
        }

        function changePage(step) {
            const next = currentPage + step;
            if (next >= 0 && next < pages.length) {
                currentPage = next;
                renderPage();
            } else if (next === pages.length) {
                alert("Parabéns, Desenvolvedor! Você completou toda a trilha. Sucesso em sua carreira no Amapá e no mundo!");
            }
        }

        function updateDots() {
            const dotNav = document.getElementById('dotNav');
            dotNav.innerHTML = '';
            const start = Math.max(0, currentPage - 3);
            const end = Math.min(pages.length, start + 7);

            for (let i = 0; i < pages.length; i++) {
                if (i >= start && i < end) {
                    const dot = document.createElement('div');
                    dot.className = `w-1.5 h-1.5 rounded-full transition-all duration-300 ${i === currentPage ? 'bg-purple-600 w-6' : 'bg-slate-300'}`;
                    dotNav.appendChild(dot);
                }
            }
        }

        renderPage();
    </script>
</body>
