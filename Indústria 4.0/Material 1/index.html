                        <button onclick="alert('Incorreto!')" class="w-full p-4 text-left border border-slate-200 rounded-xl hover:bg-indigo-50 transition">A) Eletricidade.</button>
                        <button onclick="alert('Correto! O vapor movia as primeiras máquinas.')" class="w-full p-4 text-left border border-slate-200 rounded-xl hover:bg-emerald-50 transition">B) Vapor.</button>
                        <button onclick="alert('Incorreto!')" class="w-full p-4 text-left border border-slate-200 rounded-xl hover:bg-red-50 transition">C) Pilhas de Lítio.</button>

            },
            {
                title: "Quiz: IoT",
                content: `
                    <h2 class="text-3xl font-bold mb-6">28. Quiz Rápido II</h2>
                    <p class="mb-4 font-medium">O que é a Internet das Coisas (IoT)?</p>
                    <div class="space-y-2">
                        <button onclick="alert('Correto!')" class="w-full p-4 text-left border border-slate-200 rounded-xl hover:bg-emerald-50 transition">A) Conectar objetos do dia a dia à internet.</button>
                        <button onclick="alert('Incorreto!')" class="w-full p-4 text-left border border-slate-200 rounded-xl hover:bg-red-50 transition">B) Um site para comprar coisas usadas.</button>
                        <button onclick="alert('Incorreto!')" class="w-full p-4 text-left border border-slate-200 rounded-xl hover:bg-red-50 transition">C) Jogar videogame online.</button>
                    </div>
                `
            },
            {
                title: "Quiz: Cloud",
                content: `
                    <h2 class="text-3xl font-bold mb-6">29. Quiz Rápido III</h2>
                    <p class="mb-4 font-medium">Onde fica "guardada" a informação na Indústria 4.0?</p>
                    <div class="space-y-2">
                        <button onclick="alert('Incorreto!')" class="w-full p-4 text-left border border-slate-200 rounded-xl hover:bg-red-50 transition">A) Em disquetes guardados no cofre.</button>
                        <button onclick="alert('Correto! A Nuvem permite acesso global.')" class="w-full p-4 text-left border border-slate-200 rounded-xl hover:bg-emerald-50 transition">B) Na Computação em Nuvem.</button>
                        <button onclick="alert('Incorreto!')" class="w-full p-4 text-left border border-slate-200 rounded-xl hover:bg-red-50 transition">C) Apenas na memória RAM do robô.</button>

            {
                title: "Final do Material 1",
                content: `
                    <div class="text-center py-10">
                        <div class="w-24 h-24 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-8 animate-bounce">
                            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </div>
                        <h2 class="text-4xl font-extrabold text-slate-900 mb-4">Material 1 Concluído!</h2>
                        <p class="text-slate-500 mb-8 max-w-sm mx-auto text-lg">Você acaba de dar o primeiro passo para se tornar um desenvolvedor preparado para a Transformação Digital.</p>
                    </div>
                `
            }
        ];

        let currentPage = 0;

        function renderPage() {
            const container = document.getElementById('contentTarget');
            const page = pages[currentPage];
            
            container.innerHTML = `
                <div class="page-content active">
                    <p class="text-xs font-black text-indigo-400 uppercase tracking-[0.2em] mb-3">${page.title}</p>
                    ${page.content}
                </div>
            `;

            const progress = ((currentPage + 1) / pages.length) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
            document.getElementById('pageIndicator').innerText = `${String(currentPage + 1).padStart(2, '0')}/${pages.length}`;
            
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').innerText = currentPage === pages.length - 1 ? "Concluir Dia 1" : "Próxima Página";
            
            window.scrollTo(0, 0);
            updateDots();
        }

        function changePage(step) {
            const next = currentPage + step;
            if (next >= 0 && next < pages.length) {
                currentPage = next;
                renderPage();
            } else if (next === pages.length) {
                alert("Parabéns! Você concluiu as primeiras 4 horas de fundamentos da Indústria 4.0.");
            }
        }

        function updateDots() {
            const dotNav = document.getElementById('dotNav');
            dotNav.innerHTML = '';
            const start = Math.max(0, currentPage - 3);
            const end = Math.min(pages.length, start + 7);

            for (let i = 0; i < pages.length; i++) {
                if (i >= start && i < end) {
                    const dot = document.createElement('div');
                    dot.className = `w-1.5 h-1.5 rounded-full transition-all duration-300 ${i === currentPage ? 'bg-indigo-600 w-6' : 'bg-slate-300'}`;
                    dotNav.appendChild(dot);
                }
            }
        }

        renderPage();
    </script>
</body>
