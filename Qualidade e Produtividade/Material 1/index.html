    <script>
        const pages = [
            {

                content: `
                    <div class="text-center py-12">

                        <p class="text-lg text-slate-600 max-w-xl mx-auto mb-10">Você vai aprender que a qualidade não é apenas estética, é o que garante que seu código funcione hoje e seja fácil de consertar amanhã.</p>

                                <li class="flex gap-3 items-start"><span class="bg-indigo-100 p-1 rounded">🚀</span> <b>Qualidade:</b> Além do "funciona na minha máquina".</li>
                                <li class="flex gap-3 items-start"><span class="bg-indigo-100 p-1 rounded">🧹</span> <b>Metodologia 5S:</b> Faxina digital nível Ninja.</li>
                                <li class="flex gap-3 items-start"><span class="bg-indigo-100 p-1 rounded">📋</span> <b>5W2H:</b> O plano infalível para seus projetos.</li>
                            </ul>
                        </div>
                    </div>
                `
            },
            {
                title: "O que é Qualidade?",
                content: `
                    <h2 class="text-3xl font-extrabold mb-6">01. O Conceito de Qualidade</h2>
                    <p class="mb-6 leading-relaxed">No SENAI, falamos que qualidade é "atender aos requisitos". No Front-End, isso significa:</p>
                    <div class="grid sm:grid-cols-2 gap-4">
                        <div class="p-6 bg-white rounded-2xl border border-slate-200 shadow-sm">
                            <h4 class="font-bold text-indigo-600 mb-2">Para o Usuário</h4>
                            <p class="text-sm">O site abre rápido, é fácil de usar e não trava.</p>
                        </div>
                        <div class="p-4 bg-white rounded-2xl border border-slate-200 shadow-sm">
                            <h4 class="font-bold text-emerald-600 mb-2">Para a Empresa</h4>
                            <p class="text-sm">O código é fácil de manter e não custa caro consertar erros.</p>
                        </div>
                    </div>
                    <div class="mt-8 p-6 bg-indigo-900 text-indigo-100 rounded-3xl italic">
                        "Qualidade é fazer certo quando ninguém está olhando."
                    </div>
                `
            },
            {
                title: "Desafio: Código Macarrão",
                content: `
                    <h2 class="text-3xl font-extrabold mb-6">02. Desafio: Macarrão vs. Gourmet</h2>
                    <p class="mb-4 text-slate-600 italic">Analise os dois algoritmos abaixo. Qual deles você entenderia em 2 segundos?</p>
                    <div class="space-y-4">
                        <div class="bg-slate-900 rounded-xl p-4 overflow-hidden">
                            <p class="text-xs text-slate-500 mb-2">// Algoritmo A (Macarrão)</p>
                            <code class="text-pink-400 text-sm block code-font">
                                Algoritmo "x" <br>
                                Var x, y: Texto <br>
                                Inicio <br>
                                &nbsp;&nbsp;x <- ler_elemento("z") <br>
                                &nbsp;&nbsp;x.valor <- "ola " + y <br>
                                FimAlgoritmo
                            </code>
                        </div>
                        <div class="bg-slate-900 rounded-xl p-4 overflow-hidden">
                            <p class="text-xs text-slate-500 mb-2">// Algoritmo B (Qualidade)</p>
                            <code class="text-emerald-400 text-sm block code-font">
                                Algoritmo "SaudarUsuario" <br>
                                Var campoMensagem, nomeUsuario: Texto <br>
                                Inicio <br>
                                &nbsp;&nbsp;campoMensagem <- buscarElemento("msg-boas-vindas") <br>
                                &nbsp;&nbsp;exibir(campoMensagem, "Olá, " + nomeUsuario) <br>
                                FimAlgoritmo
                            </code>
                        </div>
                    </div>
                    <div class="mt-6 p-4 bg-amber-50 border-2 border-amber-200 rounded-xl">
                        <p class="font-bold text-amber-800">⚡ AÇÃO DO ALUNO:</p>
                        <p class="text-sm text-amber-900">Note como o Algoritmo B usa nomes que explicam o que está acontecendo. Produtividade é não ter que "decifrar" o próprio trabalho amanhã.</p>
                    </div>
                `
            },
            {
                title: "Produtividade não é Velocidade",
                content: `

                        <p class="text-sm text-slate-600 mb-4">Imagine dois pizzaiolos:</p>
                        <ul class="space-y-3">
                            <li><b>Pizzaiolo A:</b> Faz 10 pizzas em 10 minutos, mas 5 vêm queimadas.</li>
                            <li><b>Pizzaiolo B:</b> Faz 6 pizzas em 10 minutos, todas perfeitas.</li>
                        </ul>
                        <p class="mt-4 text-sm font-bold text-indigo-600">Quem é o mais produtivo? O B. O A perde tempo tendo que refazer o trabalho.</p>
                    </div>
                `
            },
            {
                title: "Introdução ao 5S",
                content: `

            {
                title: "5S: 1. Seiri (Senso de Utilização)",
                content: `

                    <div class="p-6 bg-red-50 rounded-2xl border border-red-100">

                        <p class="text-sm text-red-900 mb-4">Saia deste navegador agora! Vá na sua pasta de <b>Downloads</b> e apague todos os instaladores (.exe, .msi, .dmg), todos os arquivos (.png, .pdf, .txt, .docx), que você já usou e não precisa mais.</p>

                    </div>
                `

            {
                title: "5S: 2. Seiton (Senso de Organização)",
                content: `

                        <div class="bg-slate-900 p-4 rounded-xl text-xs text-blue-300 code-font">
                            /Documentos<br>
                            &nbsp;&nbsp;/PROJETOS-SENAI<br>
                            &nbsp;&nbsp;&nbsp;&nbsp;/aula-01-intro<br>
                            &nbsp;&nbsp;&nbsp;&nbsp;/aula-02-html<br>
                        </div>
                    </div>
                `
            },
            {
                title: "5S: 3. Seiso (Senso de Limpeza)",
                content: `
                    <h2 class="text-3xl font-extrabold mb-6">07. Seiso: Limpando o Código</h2>
                    <p class="mb-4 leading-relaxed">Código limpo não tem "linhas fantasmas" ou restos de testes antigos.</p>
                    <div class="bg-white p-6 rounded-2xl border border-slate-200">
                        <h4 class="font-bold mb-4">Checklist do Seiso no Código:</h4>
                        <ul class="space-y-2 text-sm">
                            <li>[ ] Apaguei trechos de código comentados que não uso mais?</li>
                            <li>[ ] Removi as linhas em branco excessivas?</li>
                            <li>[ ] Limpei variáveis que foram criadas e nunca utilizadas?</li>
                        </ul>
                    </div>
                `
            },
            {
                title: "5S: 4. Seiketsu (Padronização)",
                content: `
                    <h2 class="text-3xl font-extrabold mb-6">08. Seiketsu: Padronizar é Viver</h2>
                    <p class="mb-4">Imagine se cada dev decidisse escrever nomes de variáveis em um idioma diferente. Vira um caos!</p>
                    <div class="p-6 bg-emerald-50 rounded-2xl border border-emerald-100">
                        <h4 class="font-bold text-emerald-800 mb-2">O Padrão é seu amigo:</h4>
                        <p class="text-sm text-emerald-900 italic">No Front-End, usamos guias de estilo (Style Guides) para garantir que o código pareça ter sido escrito pela mesma pessoa, facilitando a leitura de todos.</p>
                    </div>
                `
            },
            {
                title: "5S: 5. Shitsuke (Disciplina)",
                content: `
                    <h2 class="text-3xl font-extrabold mb-6">09. Shitsuke: O hábito faz o mestre</h2>
                    <p class="mb-4 leading-relaxed">Não adianta limpar o PC hoje e amanhã ele estar bagunçado de novo. A disciplina é fazer os 4 "S" anteriores todos os dias até virar automático.</p>
                    <div class="p-6 bg-indigo-600 text-white rounded-3xl shadow-lg">
                        <p class="text-center font-bold">Dica:</p>
                        <p class="text-sm text-center mt-2">Separe os últimos 10 minutos do seu dia de estudo apenas para organizar suas pastas e commits.</p>
                    </div>
                `
            },
            {
                title: "A Ferramenta PDCA",
                content: `
                    <h2 class="text-3xl font-extrabold mb-6">10. O Ciclo PDCA</h2>
                    <p class="mb-6">O PDCA é o motor da melhoria contínua. No desenvolvimento, ele funciona assim:</p>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-4 bg-white rounded-xl border-t-4 border-blue-500 shadow-sm text-center">
                            <b class="block">PLAN</b> (Planejar)
                        </div>
                        <div class="p-4 bg-white rounded-xl border-t-4 border-emerald-500 shadow-sm text-center">
                            <b class="block">DO</b> (Fazer)
                        </div>
                        <div class="p-4 bg-white rounded-xl border-t-4 border-amber-500 shadow-sm text-center">
                            <b class="block">CHECK</b> (Verificar)
                        </div>
                        <div class="p-4 bg-white rounded-xl border-t-4 border-red-500 shadow-sm text-center">
                            <b class="block">ACT</b> (Agir/Corrigir)
                        </div>
                    </div>
                `
            },
            {
                title: "PDCA na prática do Dev",
                content: `
                    <h2 class="text-3xl font-extrabold mb-6 text-slate-900">11. PDCA: Exemplo Real</h2>
                    <p class="mb-4">Você vai criar uma barra de navegação:</p>
                    <ul class="space-y-4">
                        <li class="p-3 bg-white rounded-lg border-l-4 border-blue-500 text-sm"><b>Plan:</b> Desenho o rascunho (wireframe) e defino as cores.</li>
                        <li class="p-3 bg-white rounded-lg border-l-4 border-emerald-500 text-sm"><b>Do:</b> Escrevo o HTML e o CSS.</li>
                        <li class="p-3 bg-white rounded-lg border-l-4 border-amber-500 text-sm"><b>Check:</b> Abro no navegador e vejo que o menu sumiu no celular.</li>
                        <li class="p-3 bg-white rounded-lg border-l-4 border-red-500 text-sm"><b>Act:</b> Ajusto o código para o menu aparecer no mobile.</li>
                    </ul>
                `
            },
            {
                title: "A Metodologia 5W2H",
                content: `
                    <h2 class="text-3xl font-extrabold mb-6">12. O Checklist 5W2H</h2>
                    <p class="mb-6">É um conjunto de perguntas para você não esquecer nada antes de começar um projeto técnico.</p>
                    <div class="bg-slate-900 p-6 rounded-3xl text-slate-300 text-xs">
                        <p class="mb-2"><b>What?</b> (O que será feito?)</p>
                        <p class="mb-2"><b>Why?</b> (Por que fazer?)</p>
                        <p class="mb-2"><b>Who?</b> (Quem fará?)</p>
                        <p class="mb-2"><b>Where?</b> (Onde será feito?)</p>
                        <p class="mb-2"><b>When?</b> (Quando será feito?)</p>
                        <p class="mb-2"><b>How?</b> (Como será feito?)</p>
                        <p><b>How Much?</b> (Quanto custará/tempo levará?)</p>
                    </div>
                `
            },
            {
                title: "Desafio 5W2H",
                content: `
                    <h2 class="text-3xl font-extrabold mb-6">13. Desafio: Planejando seu 'Formulário de Contato'</h2>
                    <p class="mb-6 text-sm text-slate-600">Preencha mentalmente:</p>
                    <div class="space-y-2">
                        <input type="text" placeholder="What? (Ex: Criar página de contato)" class="w-full p-3 rounded-xl border border-slate-200">
                        <input type="text" placeholder="How? (Ex: Usando HTML semântico e CSS Grid)" class="w-full p-3 rounded-xl border border-slate-200">
                        <input type="text" placeholder="When? (Ex: Entregar até o fim da aula)" class="w-full p-3 rounded-xl border border-slate-200">

                    <p class="mt-4 text-xs italic">Planejar 5 minutos economiza 1 hora de código perdido!</p>
                `
            },
            {
                title: "Eficiência vs Eficácia",
                content: `
                    <h2 class="text-3xl font-extrabold mb-6">14. Eficiência vs. Eficácia</h2>
                    <p class="mb-4">Diferenças que todo profissional de qualidade deve saber:</p>
                    <div class="space-y-4">
                        <div class="p-5 bg-white rounded-2xl border-l-8 border-indigo-400">
                            <h4 class="font-bold">Eficiência:</h4>
                            <p class="text-sm">É fazer as coisas certo (Codar sem erros de sintaxe).</p>
                        </div>
                        <div class="p-5 bg-white rounded-2xl border-l-8 border-emerald-400">
                            <h4 class="font-bold">Eficácia:</h4>
                            <p class="text-sm">É fazer as coisas certas (Fazer o site que o cliente realmente precisa).</p>
                        </div>
                    </div>
                `
            },
            {
                title: "O Custo do Erro",
                content: `
                    <h2 class="text-3xl font-extrabold mb-6">15. A Lei de Crosby</h2>
                    <p class="mb-4 leading-relaxed">"O custo da qualidade é o custo de fazer as coisas erradas".</p>
                    <div class="bg-red-50 p-6 rounded-2xl border border-red-200 text-center">
                        <p class="text-sm text-red-800">Se você gasta 10 min fazendo um código ruim e depois 2 horas consertando os bugs, você não foi produtivo. Qualidade economiza tempo.</p>
                    </div>
                `
            },
            {
                title: "Padrões de Nomenclatura",
                content: `
                    <h2 class="text-3xl font-extrabold mb-6">16. Qualidade Técnica: Nomes</h2>
                    <p class="mb-4">Dar nomes bons para classes CSS é um ato de qualidade.</p>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-4 bg-red-100 rounded-xl text-center">
                            <span class="text-xs font-bold text-red-600 block mb-2">RUIM (Pseudocódigo)</span>
                            <code class="text-xs">var x <- 10</code>
                        </div>
                        <div class="p-4 bg-emerald-100 rounded-xl text-center">
                            <span class="text-xs font-bold text-emerald-600 block mb-2">BOM (Pseudocódigo)</span>
                            <code class="text-xs">var totalProdutos <- 10</code>
                        </div>
                    </div>
                `
            },
            {
                title: "Comentários Úteis",
                content: `
                    <h2 class="text-3xl font-extrabold mb-6 text-slate-900">17. Qualidade Técnica: Comentários</h2>
                    <p class="mb-4">Comente o "porquê", não o "quê".</p>
                    <div class="bg-slate-900 p-4 rounded-xl text-xs space-y-4">
                        <div class="opacity-50">
                            <p class="text-pink-400">// RUIM: Comentário óbvio</p>
                            <p class="text-slate-300">var botao <- buscar("btn-enviar") // Busca o botão</p>
                        </div>
                        <div class="">
                            <p class="text-emerald-400">// BOM: Explica a regra de negócio</p>
                            <p class="text-slate-300">// Bloqueia o botão para evitar envios duplos no servidor</p>
                            <p class="text-slate-300">desativar(botao)</p>

                    </div>
                `
            },
            {

                content: `

                    <p class="mb-4 leading-relaxed">Qualidade total significa que seu site pode ser usado por qualquer pessoa, inclusive quem usa leitores de tela.</p>
                    <p class="font-bold text-indigo-600 uppercase text-xs">Dica de Produtividade:</p>
                    <p class="text-sm">Use tags corretas (header, nav, main, footer) em vez de apenas <code>div</code>. Isso é qualidade estrutural.</p>

            },
            {
                title: "A Pirâmide da Qualidade",
                content: `

                    <div class="flex flex-col items-center">

            },
            {
                title: "Eliminando Desperdícios",
                content: `
                    <h2 class="text-3xl font-extrabold mb-6">20. Lean Thinking: Desperdícios</h2>

        let currentPage = 0;

        function renderPage() {
            const container = document.getElementById('contentTarget');
            const page = pages[currentPage];
            
            container.innerHTML = `
                <div class="page-content active">
                    <p class="text-xs font-black text-indigo-400 uppercase tracking-[0.2em] mb-3">${page.title}</p>
                    ${page.content}
                </div>
            `;

            // Update Progress Bar
            const progress = ((currentPage + 1) / pages.length) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
            
            // Update Page Indicator
            document.getElementById('pageIndicator').innerText = `${String(currentPage + 1).padStart(2, '0')}/${pages.length}`;
            
            // Nav Buttons
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').innerText = currentPage === pages.length - 1 ? "Finalizar material" : "Próxima Página";
            
            window.scrollTo(0, 0);
            updateDots();
        }

        function changePage(step) {
            const next = currentPage + step;
            if (next >= 0 && next < pages.length) {
                currentPage = next;
                renderPage();
            } else if (next === pages.length) {
                alert("Parabéns, Desenvolvedor! Você completou o Material 1 de Qualidade. Agora coloque em prática o que aprendeu!");
            }
        }

        function updateDots() {
            const dotNav = document.getElementById('dotNav');
            dotNav.innerHTML = '';
            
            const start = Math.max(0, currentPage - 3);
            const end = Math.min(pages.length, start + 7);

            for (let i = 0; i < pages.length; i++) {
                if (i >= start && i < end) {
                    const dot = document.createElement('div');
                    dot.className = `w-1.5 h-1.5 rounded-full transition-all duration-300 ${i === currentPage ? 'bg-indigo-600 w-6' : 'bg-slate-300'}`;
                    dotNav.appendChild(dot);
                }
            }
        }

        renderPage();
    </script>
