                        <button class="w-full p-4 text-left border border-slate-200 rounded-xl hover:bg-blue-50 transition" onclick="alert('Incorreto: 4 horas é muito tempo!')">A) A cada 4 horas.</button>
                        <button class="w-full p-4 text-left border border-slate-200 rounded-xl hover:bg-blue-50 transition" onclick="alert('Correto! O ideal é entre 50 a 60 min.')">B) A cada 50 a 60 minutos.</button>
                        <button class="w-full p-4 text-left border border-slate-200 rounded-xl hover:bg-blue-50 transition" onclick="alert('Pausar é bom, mas 10 min é pouco para TI.')">C) Só quando o código compilar.</button>
                    </div>
                `
            },
            {
                title: "Quiz Final: Parte 2",
                content: `
                    <h2 class="text-3xl font-bold mb-6 text-slate-900">29. Quiz de Fixação</h2>
                    <p class="mb-4">Onde deve estar o topo da tela do seu monitor?</p>
                    <div class="space-y-3">
                        <button class="w-full p-4 text-left border border-slate-200 rounded-xl hover:bg-blue-50 transition" onclick="alert('Correto! Isso mantém o pescoço neutro.')">A) Na altura dos olhos.</button>
                        <button class="w-full p-4 text-left border border-slate-200 rounded-xl hover:bg-blue-50 transition" onclick="alert('Incorreto: isso causa tensão cervical.')">B) Abaixo da linha do peito.</button>
                        <button class="w-full p-4 text-left border border-slate-200 rounded-xl hover:bg-blue-50 transition" onclick="alert('Incorreto: você forçará o pescoço para cima.')">C) Acima da cabeça.</button>
                    </div>
                `
            },
            {
                title: "Conclusão",
                content: `
                    <div class="text-center py-10">
                        <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">✓</div>
                        <h2 class="text-3xl font-bold mb-4 text-slate-900">Material Concluído!</h2>
                    </div>
                `
            }
        ];

        let currentPage = 0;

        function renderPage() {
            const container = document.getElementById('contentTarget');
            const page = pages[currentPage];
            
            container.innerHTML = `
                <div class="page-content active">
                    <p class="text-xs font-bold text-blue-600 uppercase tracking-widest mb-2">${page.title}</p>
                    ${page.content}
                </div>
            `;

            // Update Progress UI
            const progress = ((currentPage + 1) / pages.length) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
            document.getElementById('pageIndicator').innerText = `Pág. ${String(currentPage + 1).padStart(2, '0')}/${pages.length}`;
            
            // Handle buttons
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').innerText = currentPage === pages.length - 1 ? "Finalizar" : "Próxima Página";
            
            window.scrollTo(0,0);
            updateDots();
        }

        function changePage(step) {
            const next = currentPage + step;
            if (next >= 0 && next < pages.length) {
                currentPage = next;
                renderPage();
            } else if (next === pages.length) {
                alert("Parabéns! Continue cuidando da sua saúde.");
            }
        }

        function updateDots() {
            const dotNav = document.getElementById('dotNav');
            dotNav.innerHTML = '';
            // Only show 5 dots around current for mobile
            const start = Math.max(0, currentPage - 2);
            const end = Math.min(pages.length, start + 5);

            for (let i = 0; i < pages.length; i++) {
                if (i >= start && i < end) {
                    const dot = document.createElement('div');
                    dot.className = `w-1.5 h-1.5 rounded-full transition-all ${i === currentPage ? 'bg-blue-600 w-4' : 'bg-slate-300'}`;
                    dotNav.appendChild(dot);
                }
            }
        }

        // Initialize
        renderPage();
    </script>
</body>
</html>
