<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logica de Programação | Fundamentos e Algoritmos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Fira+Code:wght@400;500&display=swap');

        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --accent: #10b981;
            --bg-light: #f8fafc;
            --bg-dark: #0f172a;
        }

        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .dark-mode { background-color: var(--bg-dark); color: #f1f5f9; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 1rem;
        }
        .dark-mode .glass-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pulo-gato {
            border-left: 4px solid #f59e0b;
            background: #fffbeb;
            padding: 1.25rem;
            border-radius: 0 0.5rem 0.5rem 0;
        }
        .dark-mode .pulo-gato { background: #451a03; color: #fde68a; }

        .battlefield {
            border-left: 4px solid #ef4444;
            background: #fef2f2;
            padding: 1.25rem;
            border-radius: 0 0.5rem 0.5rem 0;
        }
        .dark-mode .battlefield { background: #450a0a; color: #fecaca; }

        pre { font-family: 'Fira Code', monospace; white-space: pre-wrap; }

        .progress-fill { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-content { animation: fadeIn 0.4s forwards; }

        .xp-popup {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <div id="xp-popup" class="xp-popup">+50 XP!</div>

    <div class="flex h-screen overflow-hidden">

                </div>

            <nav class="flex-1 overflow-y-auto p-4 space-y-1 custom-scrollbar" id="toc-list">

            </nav>
            <div class="p-4 border-t border-slate-200 dark:border-slate-800">

                    <button onclick="toggleSidebarMobile()" class="lg:hidden p-2 text-slate-500"><i class="fas fa-bars"></i></button>

                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full text-xs font-bold">

                        <button onclick="adjustFont(-1)" class="hover:text-blue-500">A-</button>

                </div>
            </header>

            <div class="w-full h-1 bg-slate-100 dark:bg-slate-800 overflow-hidden">
                <div id="progress-bar" class="h-full bg-blue-600 progress-fill" style="width: 0%"></div>
            </div>

            <div class="flex-1 overflow-y-auto p-6 md:p-12 lg:p-20" id="content-viewport">

                </div>

                <div class="hidden md:flex flex-col items-center">

                </div>
                <button onclick="next()" id="btn-next" class="px-8 py-2 rounded-xl bg-blue-600 text-white font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 dark:shadow-none transition flex items-center gap-2">
                    Próximo <i class="fas fa-chevron-right"></i>
                </button>
            </footer>

        </main>
    </div>

    <script>
        const material = [
            {
                id: "welcome",
                title: "Início da Jornada",
                icon: "fa-rocket",
                content: `

                `

            {

                            <h4 class="font-bold">Padrões</h4>

                            <h4 class="font-bold">Algoritmos</h4>
                        </div>
                    </div>
                `
            },
            {
                id: "pillar-1",
                title: "Pilar 1: Decomposição",
                icon: "fa-scissors",
                content: `
                    <h2 class="text-3xl font-bold mb-4">Decomposição: Dividir para Conquistar</h2>
                    <p>Pegue um problema grande e quebre em problemas menores.</p>

                `
            },
            {
                id: "pillar-2",
                title: "Pilar 2: Padrões",
                icon: "fa-clone",
                content: `
                    <h2 class="text-3xl font-bold mb-4">Reconhecimento de Padrões</h2>
                    <p>Quais problemas já resolvemos antes que se parecem com este?</p>
                    <div class="pulo-gato mt-6">
                        <strong>Analogia:</strong> Se você sabe fazer uma receita de bolo de chocolate, provavelmente sabe fazer uma de cenoura trocando poucos ingredientes. Na programação, reutilizamos soluções de problemas parecidos.

                `
            },
            {
                id: "pillar-3",

            {

                        3. Ação B<br>
                        4. Fim

            {

                    <div class="pulo-gato mt-6">
                        <strong>Dica:</strong> Se você não consegue explicar o passo a passo em português, você não conseguirá programar. O planejamento é 80% do trabalho.
                    </div>
                `
            },
            {
                id: "example-tire",
                title: "Exemplo: Trocar Pneu",

                icon: "fa-sitemap",
                content: `

                    <p>Programadores usam essas duas palavras o tempo todo.</p>
                    <div class="grid grid-cols-2 gap-4 mt-6">

                        </div>
                        <div class="p-4 border rounded-xl">
                            <h4 class="font-bold text-green-500">OU (OR)</h4>
                            <p class="text-xs">Pelo menos uma deve ser verdadeira. (Ex: Ter convite OU ser VIP).</p>

                `
            },
            {

                title: "Hardware + Software",

                        <strong>Curiosidade:</strong> Se o seu Windows trava, o software parou de mandar ordens, mas o hardware continua lá, ligado, sem saber o que fazer.

            },
            {
                id: "abstract-data",
                title: "Abstraindo Dados",
                icon: "fa-database",
                content: `

                    <p>Lógica serve para manipular dados. No login, os dados são "texto". Em um jogo, são "números" (vida, posição).</p>
                    <div class="p-6 bg-slate-100 dark:bg-slate-800 rounded-2xl mt-6">
                        <p>Nesta fase, entenda apenas que <b>Dados</b> são a matéria-prima e a <b>Lógica</b> é a ferramenta que os molda.</p>
                    </div>
                `
            },
            {
                id: "algorithm-best-practices",
                title: "Boas Práticas",
                icon: "fa-check-double",
                content: `
                    <h2 class="text-3xl font-bold mb-4">Como escrever bons Algoritmos?</h2>
                    <ul class="list-disc pl-6 space-y-4 mt-6">
                        <li><b>Seja Direto:</b> Não enrole;</li>
                        <li><b>Um passo por vez:</b> Não faça duas coisas na mesma linha;</li>
                        <li><b>Pense nas Exceções:</b> E se a internet cair? E se o pneu reserva também estiver furado?</li>
                    </ul>
                `
            },
            {
                id: "industry-google",
                title: "Como o Google faz?",
                icon: "fa-search",
                content: `
                    <h2 class="text-3xl font-bold mb-4">Lógica em Grande Escala</h2>
                    <p>O Google processa trilhões de páginas. Como?</p>
                    <div class="pulo-gato mt-6">
                        <strong>Algoritmo de Busca:</strong> Ele usa a <b>Decomposição</b> para dividir a internet em partes e a <b>Abstração</b> para ignorar sites repetidos ou de baixa qualidade.
                    </div>

            },
            {
                id: "flashcards-1",
                title: "Revisão Rápida",
                icon: "fa-bolt",
                content: `
                    <h2 class="text-3xl font-bold mb-4">Flashcards: Teste sua memória!</h2>
                    <div class="space-y-4 mt-6">
                        <details class="p-4 border rounded-xl cursor-pointer">
                            <summary class="font-bold">O que é um algoritmo?</summary>
                            <p class="mt-2 text-slate-500">Uma sequência finita de passos para resolver um problema.</p>
                        </details>
                        <details class="p-4 border rounded-xl cursor-pointer">
                            <summary class="font-bold">Dê um exemplo de Software de Base.</summary>
                            <p class="mt-2 text-slate-500">Sistema Operacional (Windows, Linux, Android).</p>
                        </details>
                        <details class="p-4 border rounded-xl cursor-pointer">
                            <summary class="font-bold">Qual o pilar da Abstração?</summary>
                            <p class="mt-2 text-slate-500">Ignorar detalhes irrelevantes e focar no essencial.</p>
                        </details>
                    </div>
                `
            },
            {
                id: "logic-puzzle",
                title: "Enigma de Lógica",
                icon: "fa-puzzle-piece",
                content: `
                    <h2 class="text-3xl font-bold mb-4">Desafio: O Lobo, o Bode e a Alface</h2>

                        Tente criar o algoritmo (passo a passo) para atravessar todos em segurança.
                    </div>
                `
            },
            {
                id: "first-contact-review",
                title: "Resumo do Dia",
                icon: "fa-graduation-cap",
                content: `
                    <h2 class="text-3xl font-bold mb-4">O que aprendemos hoje?</h2>
                    <p class="text-lg">Você deu o primeiro passo para se tornar um desenvolvedor. Você aprendeu a estruturar seu raciocínio antes de codificar.</p>
                    <div class="grid grid-cols-2 gap-4 mt-6 text-sm">
                        <div class="p-3 bg-green-50 dark:bg-green-900/20 rounded">Pensamento Computacional</div>
                        <div class="p-3 bg-green-50 dark:bg-green-900/20 rounded">Software vs Hardware</div>
                        <div class="p-3 bg-green-50 dark:bg-green-900/20 rounded">Algoritmo de Login</div>
                        <div class="p-3 bg-green-50 dark:bg-green-900/20 rounded">Algoritmo Descritivo</div>
                    </div>
                `
            },
            {
                id: "faq",
                title: "Dúvidas Frequentes",
                icon: "fa-question-circle",
                content: `
                    <h2 class="text-3xl font-bold mb-4">FAQ</h2>
                    <div class="space-y-4">
                        <p><b>P: Preciso saber matemática?</b><br>R: Para lógica básica, você precisa saber somar, subtrair e comparar. O foco é o raciocínio.</p>
                        <p><b>P: Quando vou escrever código real?</b><br>R: Em breve! Mas primeiro sua mente precisa estar treinada para pensar como o computador.</p>
                    </div>
                `
            },
            {
                id: "next-steps",
                title: "Próximos Passos",
                icon: "fa-flag-checkered",
                content: `
                    <h2 class="text-4xl font-extrabold mb-4 text-blue-600 tracking-tighter">Parabéns!</h2>
                    <p class="text-xl">Você concluiu o Material.</p>

                `
            }
        ];

        let currentIdx = parseInt(localStorage.getItem('savedSlide_d1')) || 0;
        let userXP = parseInt(localStorage.getItem('savedXP_d1')) || 0;
        let fontSize = 16;

        function render() {
            const slide = material[currentIdx];
            const container = document.getElementById('slide-container');
            
            container.style.opacity = 0;
            
            setTimeout(() => {
                container.innerHTML = slide.content;
                document.getElementById('page-number').innerText = `${String(currentIdx + 1).padStart(2, '0')} / ${material.length}`;
                document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / material.length) * 100}%`;
                
                updateTOC();
                localStorage.setItem('savedSlide_d1', currentIdx);
                
                container.style.opacity = 1;
                document.getElementById('content-viewport').scrollTop = 0;
            }, 200);

            updateXPDisplay();
            checkButtons();
        }

        function next() {
            if (currentIdx < material.length - 1) {
                currentIdx++;
                addXP(15);
                render();
            }
        }

        function prev() {
            if (currentIdx > 0) {
                currentIdx--;
                render();
            }
        }

        function goTo(idx) {
            currentIdx = idx;
            render();
        }

        function updateTOC() {
            const list = document.getElementById('toc-list');
            list.innerHTML = material.map((item, index) => `
                <button onclick="goTo(${index})" class="w-full flex items-center gap-3 p-3 rounded-lg text-left transition ${index === currentIdx ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800'}">
                    <i class="fas ${item.icon} w-5 text-center"></i>
                    <span class="text-sm font-semibold truncate">${item.title}</span>
                </button>
            `).join('');
        }

        function addXP(val) {
            userXP += val;
            localStorage.setItem('savedXP_d1', userXP);
            updateXPDisplay();
            if (val > 10) showXPPopup(val);
        }

        function updateXPDisplay() {
            document.getElementById('xp-display').innerText = `${userXP} XP`;
            const ranks = ["Novato da Lógica", "Aspirante a Dev", "Pensador Analítico", "Mestre dos Algoritmos", "Lenda do Código"];
            const rankIdx = Math.min(Math.floor(userXP / 200), ranks.length - 1);
            document.getElementById('user-rank').innerText = ranks[rankIdx];
            document.getElementById('user-avatar').innerText = ranks[rankIdx].charAt(0);
        }

        function showXPPopup(val) {
            const pop = document.getElementById('xp-popup');
            pop.innerText = `+${val} XP!`;
            pop.style.display = 'block';
            setTimeout(() => pop.style.display = 'none', 1500);
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('theme-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        }

        function adjustFont(delta) {
            fontSize += delta;
            document.getElementById('content-viewport').style.fontSize = `${fontSize}px`;
        }

        function toggleSidebarMobile() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('hidden');
            sidebar.classList.toggle('fixed');
            sidebar.classList.toggle('inset-0');
            sidebar.classList.toggle('z-50');
        }

        function checkButtons() {
            const btnPrev = document.getElementById('btn-prev');
            btnPrev.disabled = currentIdx === 0;
            btnPrev.style.opacity = currentIdx === 0 ? 0.5 : 1;
        }

        function testLogin() {
            const email = document.getElementById('sim-email').value;
            const pass = document.getElementById('sim-pass').value;
            const result = document.getElementById('sim-result');
            
            result.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700', 'bg-yellow-100', 'text-yellow-700');
            
            if (email === "" || pass === "") {
                result.innerText = "⚠️ Lógica: Campos vazios não são permitidos!";
                result.classList.add('bg-yellow-100', 'text-yellow-700');
            } else if (!email.includes('@')) {
                result.innerText = "❌ Algoritmo: E-mail inválido (falta o @).";
                result.classList.add('bg-red-100', 'text-red-700');
            } else {
                result.innerText = "✅ Algoritmo: Acesso Liberado! Dados processados.";
                result.classList.add('bg-green-100', 'text-green-700');
                addXP(50);
            }
            result.classList.remove('hidden');
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowRight") next();
            if (e.key === "ArrowLeft") prev();
        });

        render();
    </script>
</body>
</html>
