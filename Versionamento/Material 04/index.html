                    <p class="mb-4 font-medium">O que o comando 'git push -u origin main' faz?</p>
                    <div class="space-y-2">
                        <button onclick="alert('Incorreto!')" class="w-full p-4 text-left border border-slate-700 rounded-xl hover:bg-slate-800 transition">A) Deleta o código do servidor.</button>
                        <button onclick="alert('Correto! Ele envia e estabelece a conexão padrão.')" class="w-full p-4 text-left border border-slate-700 rounded-xl hover:bg-purple-500/20 transition">B) Envia os commits locais para a branch main no servidor remoto.</button>
                    </div>
                `
            },
            {
                title: "Quiz: Documentação",
                content: `
                    <h2 class="text-3xl font-bold mb-6">29. Quiz Final - Parte II</h2>
                    <p class="mb-4 font-medium">Qual a extensão de arquivo usada para documentação formatada no Git?</p>
                    <div class="space-y-2">
                        <button onclick="alert('Correto! .md significa Markdown.')" class="w-full p-4 text-left border border-slate-700 rounded-xl hover:bg-purple-500/20 transition">A) .md (Markdown)</button>
                        <button onclick="alert('Incorreto!')" class="w-full p-4 text-left border border-slate-700 rounded-xl hover:bg-slate-800 transition">B) .doc (Word)</button>
                    </div>
                `
            },
            {
                title: "Conclusão da UC",
                content: `
                    <div class="text-center py-10">
                        <div class="w-24 h-24 bg-purple-600 text-white rounded-full flex items-center justify-center mx-auto mb-8 shadow-2xl animate-bounce">
                            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </div>
                        <h2 class="text-4xl font-extrabold text-white mb-4">Você é um Versionamento Hero!</h2>
                        <p class="text-slate-400 mb-8 max-w-sm mx-auto text-lg">Parabéns por concluir as 16 horas de treinamento. Você agora tem a base técnica para trabalhar em qualquer equipe de software do mundo.</p>
                        <div class="p-8 bg-git-module-4 rounded-[3rem] text-white shadow-2xl inline-block">
                            <h3 class="text-xl font-bold">Unidade Curricular Concluída</h3>
                            <p class="text-sm opacity-80 mt-2">Fundamentos de Versionamento e Metodologias Ágeis.</p>
                        </div>
                    </div>
                `
            }
        ];

        let currentPage = 0;

        function renderPage() {
            const container = document.getElementById('contentTarget');
            const page = pages[currentPage];
            
            container.innerHTML = `
                <div class="page-content active">
                    <p class="text-xs font-black text-purple-500 uppercase tracking-[0.2em] mb-3">${page.title}</p>
                    ${page.content}
                </div>
            `;

            const progress = ((currentPage + 1) / pages.length) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
            document.getElementById('pageIndicator').innerText = `${String(currentPage + 1).padStart(2, '0')}/${pages.length}`;
            
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').innerText = currentPage === pages.length - 1 ? "Finalizar" : "Próxima Página";
            
            window.scrollTo(0, 0);
            updateDots();
        }

        function changePage(step) {
            const next = currentPage + step;
            if (next >= 0 && next < pages.length) {
                currentPage = next;
                renderPage();
            } else if (next === pages.length) {
                alert("Parabéns, Versionamento Hero! Você acaba de subir de nível. Vá e conquiste o mundo do código!");
            }
        }

        function updateDots() {
            const dotNav = document.getElementById('dotNav');
            dotNav.innerHTML = '';
            const start = Math.max(0, currentPage - 3);
            const end = Math.min(pages.length, start + 7);

            for (let i = 0; i < pages.length; i++) {
                if (i >= start && i < end) {
                    const dot = document.createElement('div');
                    dot.className = `w-1.5 h-1.5 rounded-full transition-all duration-300 ${i === currentPage ? 'bg-purple-600 w-6' : 'bg-slate-700'}`;
                    dotNav.appendChild(dot);
                }
            }
        }

        renderPage();
    </script>
</body>
</html>
